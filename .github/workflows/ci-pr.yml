name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint library chart
        run: helm lint charts/platform-library

      - name: Lint service values
        run: |
          for svc in services/*; do
            echo "--- Linting $svc ---"
            helm dependency update "$svc"
            helm lint "$svc"
          done