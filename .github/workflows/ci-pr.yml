name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint library chart
        run: helm lint charts/platform-library

      - name: Lint service values
        run: |
          for svc in services/*; do
            echo "--- Linting $svc ---"
            helm dependency update "$svc"
            helm lint "$svc"
          done

      - name: Install kubeconform
        run: |
            curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
            sudo mv kubeconform /usr/local/bin/
  
      - name: Template and validate services
        run: |
          for svc in services/*/; do
            echo "--- Validating $svc ---"
            helm dependency update "$svc"
            helm template test "$svc" | kubeconform -strict -summary -kubernetes-version 1.35.0 -ignore-missing-schemas
            done