{{- define "platform.externalsecret" -}}
{{- range .Values.secrets }}
---

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $.Values.name }}-{{ .name }}
  labels:
    app.kubernetes.io/name: {{ $.Values.name | quote }}
    app.kubernetes.io/instance: {{ $.Release.Name | quote }}
    app.kubernetes.io/managed-by: {{ $.Release.Service | quote }}
    app.kubernetes.io/part-of: platform
    platform.io/team: {{ $.Values.team | quote }}
    platform.io/slo-tier: {{ $.Values.slo_tier | quote }}
    platform.io/on-call: {{ $.Values.on_call_channel | quote }}
spec:
  refreshInterval: {{ .refreshInterval | default "1h" }}
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ $.Values.name }}-{{ .name }}
  data:
    - secretKey: {{ .name }}
      remoteRef:
        key: {{ .remoteKey }}
{{- end }}
{{- end -}}
