# Required fields
name: sample-service
team: platform-eng
slo_tier: 3

image:
  repository: nginx
  tag: "1.27"

port: 80

env:
  - name: LOG_LEVEL
    value: "info"
  - name: APP_VERSION
    value: "1.0.0"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

securityContext: {}

probes:
  readiness: {}
  liveness: {}

# Optional — will pick up library defaults when omitted
