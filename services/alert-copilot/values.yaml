name: alert-copilot
team: platform-eng
slo_tier: "3"
on_call_channel: platform-eng-oncall

image:
  repository: 517121893325.dkr.ecr.us-east-1.amazonaws.com/alert-copilot
  tag: "2c9f5ad4290a6a1def7486fae7784da5c08506e1"

port: 8080
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

securityContext: {}

probes:
  readiness:
    path: /healthz
  liveness:
    path: /healthz

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false

rollout:
  enabled: false
